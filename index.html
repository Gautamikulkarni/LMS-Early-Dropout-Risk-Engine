<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Early Dropout Risk Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --danger: #ff3b5c;
    --warning: #ffb347;
    --success: #00e5a0;
    --text: #e8f0fe;
    --muted: #6b7fa3;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(255,107,53,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    padding: 24px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
    background: rgba(10,14,23,0.8);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 100px;
    font-size: 12px;
    color: var(--accent);
  }

  .header-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .main {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    min-height: calc(100vh - 73px);
    position: relative;
    z-index: 1;
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 32px;
    overflow-y: auto;
    max-height: calc(100vh - 73px);
    position: sticky;
    top: 73px;
  }

  .sidebar-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    transition: all 0.2s;
    outline: none;
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  .form-section {
    margin-bottom: 28px;
  }

  .form-section-title {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(0,212,255,0.15);
  }

  .predict-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border: none;
    border-radius: 8px;
    color: #0a0e17;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .predict-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,212,255,0.3);
  }

  .predict-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .predict-btn.loading {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .content {
    padding: 32px 40px;
    overflow-y: auto;
  }

  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 64px;
    opacity: 0.3;
  }

  .empty-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    opacity: 0.4;
  }

  .empty-sub {
    font-size: 13px;
    max-width: 300px;
    line-height: 1.6;
  }

  /* Results */
  .results {
    display: flex;
    flex-direction: column;
    gap: 24px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
  }

  .risk-score-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .risk-score-card.high {
    border-color: rgba(255,59,92,0.4);
    background: linear-gradient(135deg, rgba(255,59,92,0.08), var(--surface));
  }

  .risk-score-card.moderate {
    border-color: rgba(255,179,71,0.4);
    background: linear-gradient(135deg, rgba(255,179,71,0.08), var(--surface));
  }

  .risk-score-card.low {
    border-color: rgba(0,229,160,0.4);
    background: linear-gradient(135deg, rgba(0,229,160,0.08), var(--surface));
  }

  .risk-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .risk-value {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
  }

  .risk-value.high { color: var(--danger); }
  .risk-value.moderate { color: var(--warning); }
  .risk-value.low { color: var(--success); }

  .risk-category-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .risk-category-badge.high {
    background: rgba(255,59,92,0.15);
    color: var(--danger);
    border: 1px solid rgba(255,59,92,0.3);
  }

  .risk-category-badge.moderate {
    background: rgba(255,179,71,0.15);
    color: var(--warning);
    border: 1px solid rgba(255,179,71,0.3);
  }

  .risk-category-badge.low {
    background: rgba(0,229,160,0.15);
    color: var(--success);
    border: 1px solid rgba(0,229,160,0.3);
  }

  .risk-bar-container {
    margin-top: 20px;
  }

  .risk-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .risk-bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .risk-bar-fill.high { background: linear-gradient(90deg, var(--warning), var(--danger)); }
  .risk-bar-fill.moderate { background: linear-gradient(90deg, var(--success), var(--warning)); }
  .risk-bar-fill.low { background: linear-gradient(90deg, var(--accent), var(--success)); }

  .shap-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .shap-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .shap-rank {
    width: 22px;
    height: 22px;
    background: var(--surface2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .shap-name {
    flex: 1;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .shap-bar-wrap {
    width: 100px;
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .shap-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .shap-val {
    font-size: 11px;
    color: var(--muted);
    width: 50px;
    text-align: right;
    flex-shrink: 0;
  }

  .intervention-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .intervention-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
  }

  .intervention-body {
    font-size: 14px;
    line-height: 1.8;
    color: #b8c8e8;
    white-space: pre-wrap;
  }

  .intervention-body strong,
  .intervention-body b {
    color: var(--text);
    font-weight: 600;
  }

  .drivers-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .drivers-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .driver-chip {
    padding: 6px 14px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 100px;
    font-size: 12px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .driver-chip::before {
    content: '▲';
    font-size: 8px;
    color: var(--accent2);
  }

  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 20px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .loading-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }

  .loading-step {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: stepReveal 0.5s ease forwards;
  }

  .loading-step.active { color: var(--accent); }
  .loading-step::before { content: '→'; }

  @keyframes stepReveal {
    to { opacity: 1; }
  }

  .error-state {
    background: rgba(255,59,92,0.08);
    border: 1px solid rgba(255,59,92,0.3);
    border-radius: 12px;
    padding: 24px;
    color: var(--danger);
    font-size: 13px;
    line-height: 1.6;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: none; }
    .two-col { grid-template-columns: 1fr; }
    .result-header { flex-direction: column; }
    .header { padding: 16px 24px; }
    .content { padding: 24px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .api-url-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div>
      <div class="logo-text">Dropout Risk Engine</div>
      <div class="logo-sub">Behavioral Intelligence System</div>
    </div>
  </div>
  
  <div style="display:flex; gap:10px; align-items:center;">
  <button onclick="login()" style="
    background:#00d4ff;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
  ">Login</button>

  <button onclick="logout()" style="
    background:#ff3b5c;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    color:white;
    font-weight:bold;
    cursor:pointer;
  ">Logout</button>

  <div class="header-badge">Live Analysis</div>
</div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-title">Student Input</div>

    <div class="form-group">
      <label class="form-label">API Endpoint</label>
      <input class="form-input" id="apiUrl" type="text" value="https://vnpnqcr579.ap-south-1.awsapprunner.com" />
      <div class="api-url-note">Your App Runner URL</div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Engagement Signals</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Median Engagement</label>
          <input class="form-input" id="median_engagement" type="number" step="0.01" value="0.45" />
        </div>
        <div class="form-group">
          <label class="form-label">Recent 7d Engagement</label>
          <input class="form-input" id="recent_7d_median_engagement" type="number" step="0.01" value="0.30" />
        </div>
        <div class="form-group">
          <label class="form-label">Engagement CV</label>
          <input class="form-input" id="engagement_cv" type="number" step="0.01" value="0.80" />
        </div>
        <div class="form-group">
          <label class="form-label">Engagement Slope 14d</label>
          <input class="form-input" id="engagement_slope_14d" type="number" step="0.01" value="-0.05" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Behavioral Patterns</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Submission Delay</label>
          <input class="form-input" id="median_submission_delay" type="number" step="0.1" value="2.5" />
        </div>
        <div class="form-group">
          <label class="form-label">Tab Switch P75</label>
          <input class="form-input" id="tab_switch_p75" type="number" step="0.1" value="4.0" />
        </div>
        <div class="form-group">
          <label class="form-label">Drop Streak</label>
          <input class="form-input" id="longest_drop_streak" type="number" value="7" />
        </div>
        <div class="form-group">
          <label class="form-label">Response Time</label>
          <input class="form-input" id="trimmed_avg_response_time" type="number" step="0.1" value="30.0" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Performance Metrics</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">First Attempt Acc.</label>
          <input class="form-input" id="median_first_attempt_accuracy" type="number" step="0.01" value="0.5" />
        </div>
        <div class="form-group">
          <label class="form-label">Overall Accuracy</label>
          <input class="form-input" id="median_overall_accuracy" type="number" step="0.01" value="0.55" />
        </div>
        <div class="form-group">
          <label class="form-label">Total Attempts</label>
          <input class="form-input" id="total_attempts" type="number" value="20" />
        </div>
        <div class="form-group">
          <label class="form-label">Weighted Concept Fail</label>
          <input class="form-input" id="weighted_concept_failure" type="number" step="0.01" value="0.4" />
        </div>
        <div class="form-group">
          <label class="form-label">Worst Concept Fail</label>
          <input class="form-input" id="worst_concept_failure" type="number" step="0.01" value="0.7" />
        </div>
        <div class="form-group">
          <label class="form-label">Concept Variability</label>
          <input class="form-input" id="concept_variability" type="number" step="0.01" value="0.3" />
        </div>
      </div>
    </div>

    <button class="predict-btn" id="predictBtn" onclick="runPrediction()">
      Analyze Student Risk
    </button>
  </aside>

  <main class="content" id="content">
    <div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">No Analysis Yet</div>
      <div class="empty-sub">Fill in the student behavioral data on the left and click Analyze to generate a dropout risk assessment.</div>
    </div>
  </main>
</div>

<script>
// Cognito configuration
const COGNITO_DOMAIN = "https://ap-south-13jhoa6lmn.auth.ap-south-1.amazoncognito.com";
const CLIENT_ID = "2uiog0l5j4v9flu4ifk5efea2n";
const REDIRECT_URI = window.location.origin;
const API_URL = () => document.getElementById('apiUrl').value.trim();
  
function parseToken() {
if(window.location.hash.includes("id_token")) {
const params = new URLSearchParams(window.location.hash.substring(1));
const idToken = params.get("id_token");
localStorage.setItem("id_token", idToken);
window.history.replaceState({}, document.title, "/");
}
}
parseToken();
function getVal(id) {
  const el = document.getElementById(id);
  const v = el.value;
  if (id === 'longest_drop_streak' || id === 'total_attempts') return parseInt(v);
  return parseFloat(v);
}
function login() {
const url =
`${COGNITO_DOMAIN}/login?client_id=${CLIENT_ID}
&response_type=token
&scope=email+openid
&redirect_uri=${REDIRECT_URI}`;
window.location.href = url;
}
function logout() {
localStorage.removeItem("id_token");
window.location.href =
`${COGNITO_DOMAIN}/logout?client_id=${CLIENT_ID}&logout_uri=${REDIRECT_URI}`;
}
function showLoading() {
  document.getElementById('content').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Analyzing Behavioral Patterns</div>
      <div class="loading-steps">
        <div class="loading-step active" style="animation-delay:0.2s">Running XGBoost prediction</div>
        <div class="loading-step" style="animation-delay:0.8s">Computing SHAP explainability</div>
        <div class="loading-step" style="animation-delay:1.4s">Generating AI intervention via Bedrock</div>
      </div>
    </div>
  `;
  setTimeout(() => {
    const steps = document.querySelectorAll('.loading-step');
    steps.forEach((s,i) => setTimeout(() => s.classList.add('active'), i * 600));
  }, 100);
}

function getRiskClass(category) {
  return category.toLowerCase();
}

function renderResults(data) {
  const prob = (data.dropout_probability * 100).toFixed(1);
  const risk = data.risk_category;
  const riskClass = getRiskClass(risk);
  const drivers = data.top_drivers || [];
  const shap = data.shap_scores || {};
  const intervention = data.intervention || '';

  const maxShap = Math.max(...Object.values(shap).map(Math.abs), 0.01);

  const shapRows = Object.entries(shap).map(([name, val], i) => {
    const pct = (Math.abs(val) / maxShap * 100).toFixed(0);
    const displayName = name.replace(/_/g, ' ');
    return `
      <div class="shap-row">
        <div class="shap-rank">${i+1}</div>
        <div class="shap-name">${displayName}</div>
        <div class="shap-bar-wrap"><div class="shap-bar" style="width:${pct}%"></div></div>
        <div class="shap-val">${val.toFixed(3)}</div>
      </div>
    `;
  }).join('');

  const driverChips = drivers.map(d => `
    <div class="driver-chip">${d.replace(/_/g, ' ')}</div>
  `).join('');

  const formattedIntervention = intervention
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/#{1,3} (.*)/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  document.getElementById('content').innerHTML = `
    <div class="results">
      <div class="result-header">
        <div class="risk-score-card ${riskClass}">
          <div class="risk-label">Dropout Risk Probability</div>
          <div class="risk-value ${riskClass}">${prob}%</div>
          <div class="risk-category-badge ${riskClass}">${risk} Risk</div>
          <div class="risk-bar-container">
            <div class="risk-bar-track">
              <div class="risk-bar-fill ${riskClass}" style="width: 0%" id="riskBar"></div>
            </div>
          </div>
        </div>

        <div class="shap-card">
          <div class="card-title">SHAP Feature Importance</div>
          ${shapRows}
        </div>
      </div>

      <div class="drivers-card">
        <div class="card-title">Top Behavioral Drivers</div>
        <div class="drivers-list">${driverChips}</div>
      </div>

      <div class="intervention-card">
        <div class="card-title">AI-Generated Intervention</div>
        <div class="intervention-body">${formattedIntervention}</div>
      </div>
    </div>
  `;

  setTimeout(() => {
    const bar = document.getElementById('riskBar');
    if (bar) bar.style.width = prob + '%';
  }, 100);
}
if(!localStorage.getItem("id_token")){
alert("Please login first!");
return;
}
async function runPrediction() {
  const btn = document.getElementById('predictBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  btn.classList.add('loading');
  showLoading();

  const payload = {
    median_engagement: getVal('median_engagement'),
    recent_7d_median_engagement: getVal('recent_7d_median_engagement'),
    engagement_cv: getVal('engagement_cv'),
    engagement_slope_14d: getVal('engagement_slope_14d'),
    median_submission_delay: getVal('median_submission_delay'),
    tab_switch_p75: getVal('tab_switch_p75'),
    median_first_attempt_accuracy: getVal('median_first_attempt_accuracy'),
    longest_drop_streak: getVal('longest_drop_streak'),
    median_overall_accuracy: getVal('median_overall_accuracy'),
    trimmed_avg_response_time: getVal('trimmed_avg_response_time'),
    total_attempts: getVal('total_attempts'),
    weighted_concept_failure: getVal('weighted_concept_failure'),
    worst_concept_failure: getVal('worst_concept_failure'),
    concept_variability: getVal('concept_variability')
  };

  try {
    const res = await fetch(API_URL() + '/predict', {
      method: 'POST',
      headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + localStorage.getItem("id_token")
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const data = await res.json();
    renderResults(data);
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-state">
        <strong>Analysis Failed</strong><br><br>
        ${err.message}<br><br>
        Make sure your API endpoint is correct and the App Runner service is running. 
        Check that CORS is enabled on your backend.
      </div>
    `;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze Student Risk';
    btn.classList.remove('loading');
  }
}
</script>
