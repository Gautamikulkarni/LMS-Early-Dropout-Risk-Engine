<!doctype html>
<html>
<head>
  <title>Dropout Risk Demo</title>
</head>
<body>

<h2>Dropout Risk Predictor</h2>

<button onclick="login()">Login / Sign Up</button>
<button onclick="logout()">Logout</button>
<button onclick="predict()">Predict Risk</button>

<p id="result"></p>

<script>
  const COGNITO_DOMAIN = "https://ap-south-1.auth.ap-south-1.amazoncognito.com";
  const CLIENT_ID = "2uiog0l5j4v9flu4ifk5efea2n";
  const REDIRECT_URI = window.location.origin + window.location.pathname;
  const BACKEND_URL = "https://qmpf3m8pnh.ap-south-1.awsapprunner.com/predict";

  function handleLoginResponse() {
    const hash = window.location.hash;

    if (hash.includes("id_token")) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get("id_token");
      localStorage.setItem("token", token);
      //clean URL
      window.history.replaceState({}, document.title, window.location.pathname);

      alert("Login successful!");
    }
  }

  handleLoginResponse();

  // Redirect to Cognito Hosted UI
  function login() {
    const loginURL =
      COGNITO_DOMAIN +
      "/login?response_type=token" +
      "&client_id=" + CLIENT_ID +
      "&redirect_uri=" + encodeURIComponent(REDIRECT_URI);

    window.location.href = loginURL;
  }

  // Logout
  function logout() {
    localStorage.removeItem("token");
    alert("Logged out.");
  }

  // Predict API call
  async function predict() {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first!");
      return;
    }

    try {
      const response = await fetch(BACKEND_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          engagement_slope: -0.6,
          volatility_index: 0.9,
          fragmentation_score: 0.8,
          concept_failure_rate: 0.9
        }),
      });

      if (!response.ok) {
        throw new Error("Unauthorized or backend error!");
      }

      const data = await response.json();

      document.getElementById("result").innerText =
        "Risk Level: " + data.risk_level +
        " | Score: " + data.risk_score;

    } catch (err) {
      document.getElementById("result").innerText =
        "Error: " + err.message;
    }
  }
</script>

</body>
</html>
